version: '3.8'

services:
  # API Billard Book
  billard-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: billard-book-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
      - JWT_EXPIRATION_MS=3600000
    volumes:
      # Mount pour les logs (optionnel)
      - ./logs:/app/logs
    networks:
      - billard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Serveur web pour le client (old)

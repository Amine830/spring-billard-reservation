  #     - ./client/src/main/webapp:/usr/share/nginx/html:ro
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - billard-network
  #   restart: unless-stopped
  #   depends_on:
  #     - billard-api

  # Base de données (optionnel - si vous voulez ajouter une vraie DB plus tard)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: billard-db
  #   environment:
  #     POSTGRES_DB: billardbook
  #     POSTGRES_USER: billard_user
  #     POSTGRES_PASSWORD: secure_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
  #   networks:
  #     - billard-network
  #   restart: unless-stopped

networks:
  billard-network:
    driver: bridge

volumes:
  # postgres_data:
  logs:

[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

# Redirection SPA : toutes les routes côté client retombent sur index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers cache: assets fingerprintés => cache long, index.html => no-cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# Sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

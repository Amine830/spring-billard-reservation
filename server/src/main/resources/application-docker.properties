# Configuration Spring Boot pour l'environnement Docker
spring.application.name=billard-book-api
server.error.include-message=always

# Configuration de l'encodage
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Configuration JWT
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# Configuration du serveur
server.port=8080
server.address=0.0.0.0

# Configuration des logs pour Docker
logging.level.root=INFO
logging.level.com.amine.billardbook=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Configuration CORS pour le client web
spring.web.cors.allowed-origins=http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,https://billard-book.netlify.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Configuration Actuator pour health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.cors.allowed-origins=https://billard-book.netlify.app
management.endpoints.web.cors.allowed-methods=GET
management.health.defaults.enabled=true
